  <!-- Structured Data (JSON-LD) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "ScreenRec - Gravador de Tela Online Grátis",
    "alternateName": "ScreenRec - Free Online Screen Recorder",
    "url": "https://franciscowallison.github.io/video_online/",
    "description": "Gravador de tela online grátis. Grave tela, webcam e áudio no navegador. Sem download, sem cadastro. Free online screen recorder with webcam and audio.",
    "applicationCategory": "MultimediaApplication",
    "operatingSystem": "Any (Browser-based)",
    "browserRequirements": "Chrome 72+, Edge 79+, Firefox 66+, Safari 13+",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "BRL"
    },
    "featureList": [
      "Gravação de tela inteira",
      "Gravação de janela",
      "Seleção de região",
      "Overlay de webcam",
      "Gravação de áudio do sistema",
      "Gravação de microfone",
      "Download instantâneo em WebM",
      "Sem marca d'água",
      "Sem cadastro"
    ],
    "inLanguage": ["pt-BR", "en"],
    "author": {
      "@type": "Person",
      "name": "Francisco Wallison",
      "url": "https://github.com/FranciscoWallison"
    }
  }

  <link rel="stylesheet" href="/src/styles/variables.css" />
  <link rel="stylesheet" href="/src/styles/layout.css" />
  <link rel="stylesheet" href="/src/styles/recorder.css" />
  <link rel="stylesheet" href="/src/styles/editor.css" />
</head>
<body>
  <div id="app">
    <header class="app-header">
      <h1 class="logo">ScreenRec</h1>
      <span class="header-subtitle">Gravador & Editor de Tela</span>
    </header>

    <main class="app-main">

      <!-- ===== VIEW: SETUP ===== -->
      <section id="view-setup" class="view active">
        <div class="setup-container">
          <div class="setup-card">
            <h2>Fonte de Captura</h2>
            <div class="capture-options">
              <button id="btn-fullscreen" class="capture-btn active" data-type="monitor">
                <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="2" y="3" width="20" height="14" rx="2"/>
                  <line x1="8" y1="21" x2="16" y2="21"/>
                  <line x1="12" y1="17" x2="12" y2="21"/>
                </svg>
                <span>Tela Inteira</span>
              </button>
              <button id="btn-window" class="capture-btn" data-type="window">
                <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="3" width="18" height="18" rx="2"/>
                  <line x1="3" y1="9" x2="21" y2="9"/>
                  <circle cx="7" cy="6" r="1" fill="currentColor"/>
                  <circle cx="10" cy="6" r="1" fill="currentColor"/>
                </svg>
                <span>Janela</span>
              </button>
              <button id="btn-region" class="capture-btn" data-type="region">
                <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M3 7V3h4"/>
                  <path d="M17 3h4v4"/>
                  <path d="M21 17v4h-4"/>
                  <path d="M7 21H3v-4"/>
                  <rect x="7" y="7" width="10" height="10" rx="1" stroke-dasharray="3 2"/>
                </svg>
                <span>Selecionar Região</span>
              </button>
            </div>
          </div>

          <div class="setup-card">
            <h2>Webcam</h2>
            <div class="webcam-setup">
              <label class="toggle-label">
                <input type="checkbox" id="toggle-webcam" />
                <span class="toggle-switch"></span>
                <span>Ativar Webcam</span>
              </label>
              <div id="webcam-position-options" class="webcam-positions hidden">
                <span class="position-label">Posição:</span>
                <button class="pos-btn active" data-pos="bottom-right">&#8600; Inferior Direito</button>
                <button class="pos-btn" data-pos="bottom-left">&#8601; Inferior Esquerdo</button>
                <button class="pos-btn" data-pos="top-right">&#8599; Superior Direito</button>
                <button class="pos-btn" data-pos="top-left">&#8598; Superior Esquerdo</button>
              </div>
              <div id="webcam-preview-container" class="hidden">
                <video id="webcam-preview" autoplay muted playsinline></video>
              </div>
            </div>
          </div>

          <div class="setup-card">
            <h2>Áudio</h2>
            <div class="audio-options">
              <label class="toggle-label">
                <input type="checkbox" id="toggle-system-audio" checked />
                <span class="toggle-switch"></span>
                <span>Áudio do Sistema</span>
              </label>
              <label class="toggle-label">
                <input type="checkbox" id="toggle-mic" />
                <span class="toggle-switch"></span>
                <span>Microfone</span>
              </label>
            </div>
          </div>

          <button id="btn-start-recording" class="btn-primary btn-large">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
              <circle cx="12" cy="12" r="10"/>
            </svg>
            Iniciar Gravação
          </button>
        </div>
      </section>

      <!-- ===== VIEW: RECORDING ===== -->
      <section id="view-recording" class="view">
        <div class="recording-container">
          <div class="recording-preview-wrapper">
            <canvas id="recording-canvas"></canvas>
            <div id="webcam-drag-handle" class="webcam-overlay hidden">
              <video id="webcam-recording" autoplay muted playsinline></video>
            </div>
          </div>
          <div class="recording-controls">
            <div class="rec-timer">
              <span class="rec-dot"></span>
              <span id="rec-time">00:00</span>
            </div>
            <div class="rec-buttons">
              <button id="btn-pause" class="btn-control" title="Pausar">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                  <rect x="6" y="4" width="4" height="16"/>
                  <rect x="14" y="4" width="4" height="16"/>
                </svg>
              </button>
              <button id="btn-stop" class="btn-control btn-stop" title="Parar">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                  <rect x="4" y="4" width="16" height="16" rx="2"/>
                </svg>
              </button>
            </div>
          </div>
        </div>
      </section>

      <!-- ===== VIEW: DONE (after recording) ===== -->
      <section id="view-editor" class="view">
        <div class="done-container">
          <div class="done-icon">
            <svg viewBox="0 0 24 24" width="64" height="64" fill="none" stroke="#2ecc71" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <polyline points="8 12 11 15 16 9"/>
            </svg>
          </div>
          <h2>Gravação Concluída!</h2>
          <p id="recording-info" class="done-info"></p>

          <a id="btn-quick-download" class="btn-primary btn-large btn-quick-download">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Baixar Vídeo (.webm)
          </a>

          <div class="done-actions">
            <button id="btn-preview" class="btn-secondary">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                <polygon points="5,3 19,12 5,21"/>
              </svg>
              Assistir Preview
            </button>
            <button id="btn-new-recording" class="btn-secondary">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
              </svg>
              Nova Gravação
            </button>
          </div>

          <!-- Preview area (hidden until user clicks "Assistir") -->
          <div id="preview-area" class="preview-area hidden">
            <video id="editor-video" controls></video>
          </div>
        </div>
      </section>

    </main>

    <!-- Region selection overlay -->
    <div id="region-overlay" class="region-overlay hidden">
      <div class="region-instructions">Clique e arraste para selecionar a região de gravação</div>
      <canvas id="region-canvas"></canvas>
    </div>

    <!-- Toast notifications -->
    <div id="toast-container" class="toast-container"></div>
  </div>

  <!-- SEO: conteúdo para crawlers que não executam JavaScript -->
  <noscript>
    <div style="max-width:800px;margin:40px auto;padding:20px;font-family:sans-serif;color:#333;">
      <h1>ScreenRec — Gravador de Tela Online Grátis</h1>
      <h2>Free Online Screen Recorder — No Download Required</h2>
      <p>O ScreenRec é um <strong>gravador de tela online grátis</strong> que funciona direto no navegador. Grave sua tela inteira, uma janela específica ou uma região personalizada. Adicione overlay de webcam e capture áudio do sistema e microfone. <strong>Sem download, sem cadastro, sem marca d'água.</strong></p>
      <p>ScreenRec is a <strong>free online screen recorder</strong> that works directly in your browser. Record your full screen, a specific window, or a custom region. Add webcam overlay and capture system audio and microphone. <strong>No download, no signup, no watermark.</strong></p>
      <h3>Funcionalidades / Features</h3>
      <ul>
        <li>Gravação de tela inteira, janela ou região — Full screen, window, or region recording</li>
        <li>Overlay de webcam com posição ajustável — Webcam overlay with adjustable position</li>
        <li>Áudio do sistema e microfone — System audio and microphone recording</li>
        <li>Download instantâneo em WebM — Instant WebM download</li>
        <li>100% grátis, sem limites — 100% free, no limits</li>
        <li>Sem marca d'água — No watermark</li>
        <li>Sem cadastro — No signup required</li>

      <ol>
        <li>Escolha: Tela Inteira, Janela ou Região — Choose: Full Screen, Window, or Region</li>
        <li>Ative webcam e áudio se desejar — Enable webcam and audio if needed</li>
        <li>Clique em Iniciar Gravação — Click Start Recording</li>
        <li>Clique em Parar quando terminar — Click Stop when done</li>
        <li>Baixe o vídeo — Download the video</li>
      </ol>
      <h3>Compatibilidade / Browser Support</h3>
      <p>Chrome 72+, Edge 79+, Firefox 66+, Safari 13+. Funciona em Windows, Mac e Linux.</p>
      <p>Este aplicativo requer JavaScript para funcionar. Por favor, ative o JavaScript no seu navegador.</p>
      <p>This application requires JavaScript to work. Please enable JavaScript in your browser.</p>
    </div>
  </noscript>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
