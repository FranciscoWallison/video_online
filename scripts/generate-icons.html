<!DOCTYPE html>
<html>
<head><title>Generate PWA Icons</title></head>
<body>
<p>Right-click each image below and "Save Image As" to save the icons:</p>
<h3>icon-192.png</h3>
<canvas id="c192" width="192" height="192"></canvas>
<h3>icon-512.png</h3>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas) {
  const s = canvas.width;
  const ctx = canvas.getContext('2d');

  // Background
  ctx.fillStyle = '#6c5ce7';
  ctx.beginPath();
  ctx.roundRect(0, 0, s, s, s * 0.18);
  ctx.fill();

  // Record circle (white)
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(s * 0.5, s * 0.42, s * 0.22, 0, Math.PI * 2);
  ctx.fill();

  // Inner red dot
  ctx.fillStyle = '#e74c3c';
  ctx.beginPath();
  ctx.arc(s * 0.5, s * 0.42, s * 0.13, 0, Math.PI * 2);
  ctx.fill();

  // Text "REC"
  ctx.fillStyle = '#ffffff';
  ctx.font = `bold ${s * 0.14}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('REC', s * 0.5, s * 0.82);
}

drawIcon(document.getElementById('c192'));
drawIcon(document.getElementById('c512'));

// Auto-download
['c192', 'c512'].forEach(id => {
  const canvas = document.getElementById(id);
  const link = document.createElement('a');
  link.download = `icon-${canvas.width}.png`;
  link.href = canvas.toDataURL('image/png');
  document.body.appendChild(link);
  link.textContent = `Download icon-${canvas.width}.png`;
  document.body.appendChild(document.createElement('br'));
});
</script>
</body>
</html>
